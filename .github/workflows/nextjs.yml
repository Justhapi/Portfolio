# Deploy Next.js site (next-site/) to GitHub Pages
# Site deploys to https://justhapi.github.io/Portfolio
name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: next-site/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('next-site/package-lock.json') }}-${{ hashFiles('next-site/**.[jt]s', 'next-site/**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('next-site/package-lock.json') }}-

      - name: Install dependencies
        working-directory: next-site
        run: npm install --legacy-peer-deps

      - name: Build
        working-directory: next-site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: next-site/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
